<!-- Student Registration Form

Name
Email
Password
Branch (Dropdown)

Options:
- CSE
- IT
- ECE
- EE
- ME

Gender
- Male
- Female

Message (Textarea)

Submit Button
Reset Button -->
<!DOCTYPE html>
<html>
    <head>
        <title>Student Registration Form</title>
    </head>
    <body>
        <h1>Student Registration Form</h1>
        <form>
            <label>Name : </label>
            <input type="text" name="username" placeholder="Enter Your Name" required><br><br>

            <label>Email : </label>
            <input type="email" name="email-id" placeholder="Enter Your E-mail" required><br><br>

            <label>Password : </label>
            <input type="password" name="password" placeholder="Enter Password" required><br><br>

            <label>Branch : </label>
            <select name="branch">
                <option>CSE</option>
                <option>IT</option>
                <option>BI</option>
                <option>ECE</option>
                <option>EE</option>
                <option>ME</option>
            </select><br><br>

            <label>Gender : </label>
            <input type="radio" name="gender" required>Male
            <input type="radio" name="gender" required>Female<br><br>

            <label>Message : </label>
            <textarea></textarea><br><br>

            <button type="submit" value="submit">Submit</button>
            <button type="reset" value="reset">Reset</button>
        </form>
    </body>
</html>
